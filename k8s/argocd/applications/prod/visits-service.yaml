apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: visits-service-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: petclinic
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: petclinic-prod
  source:
    repoURL: https://github.com/FrankAsanteVanLaarhoven/pet-clinic.git
    targetRevision: main
    path: helm/petclinic-service
    helm:
      valueFiles:
        - ../../helm-values/visits-service.yaml
        - ../../helm-values/visits-service-prod.yaml
        - ../../helm-values/prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
