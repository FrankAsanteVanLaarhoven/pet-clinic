name: Build and Push to ECR

# Runs in the app repo (spring-petclinic-microservices fork).
# Copy this file to .github/workflows/build-push.yml in that repo.
#
# Trigger → Environment → ECR path → dispatch env
# push to main  → dev   → petclinic-dev/{service}:{sha7}  → env=dev
# push tag v*   → prod  → petclinic-prod/{service}:{tag}  → env=prod

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  id-token: write   # OIDC token for AWS assume-role
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ── Determine environment and ECR namespace from trigger ───────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.ctx.outputs.env }}
      ecr_ns: ${{ steps.ctx.outputs.ecr_ns }}
      image_tag: ${{ steps.ctx.outputs.image_tag }}
    steps:
      - name: Resolve env + tag
        id: ctx
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "env=prod"       >> "$GITHUB_OUTPUT"
            echo "ecr_ns=petclinic-prod" >> "$GITHUB_OUTPUT"
            echo "image_tag=${TAG}"      >> "$GITHUB_OUTPUT"
          else
            SHORT="${GITHUB_SHA:0:7}"
            echo "env=dev"        >> "$GITHUB_OUTPUT"
            echo "ecr_ns=petclinic-dev"  >> "$GITHUB_OUTPUT"
            echo "image_tag=${SHORT}"    >> "$GITHUB_OUTPUT"
          fi

  # ── Detect which service directories changed ────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            config-server:
              - 'spring-petclinic-config-server/**'
            discovery-server:
              - 'spring-petclinic-discovery-server/**'
            api-gateway:
              - 'spring-petclinic-api-gateway/**'
            customers-service:
              - 'spring-petclinic-customers-service/**'
            visits-service:
              - 'spring-petclinic-visits-service/**'
            vets-service:
              - 'spring-petclinic-vets-service/**'
            genai-service:
              - 'spring-petclinic-genai-service/**'
            admin-server:
              - 'spring-petclinic-admin-server/**'

  # ── Build ARM64 image, Trivy scan, push to ECR ─────────────────────────────
  build-and-push:
    needs: [setup, detect-changes]
    if: ${{ needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Set up QEMU (ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image (linux/arm64)
        run: |
          ./mvnw clean install \
            -P buildDocker \
            -pl spring-petclinic-${{ matrix.service }} \
            -am \
            -Dcontainer.platform="linux/arm64" \
            -DskipTests \
            --batch-mode

      - name: Trivy scan — fail on CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: springcommunity/spring-petclinic-${{ matrix.service }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Tag and push to ECR
        env:
          ECR_NS: ${{ needs.setup.outputs.ecr_ns }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          SOURCE="springcommunity/spring-petclinic-${{ matrix.service }}:latest"
          TARGET="${ECR_REGISTRY}/${ECR_NS}/${{ matrix.service }}:${IMAGE_TAG}"
          docker tag "${SOURCE}" "${TARGET}"
          docker push "${TARGET}"
          echo "Pushed ${TARGET}"

  # ── Notify platform repo → triggers update-image-tags ──────────────────────
  dispatch-to-platform:
    needs: [setup, detect-changes, build-and-push]
    if: ${{ always() && needs.build-and-push.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Fire repository_dispatch to platform repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          repository: FrankAsanteVanLaarhoven/pet-clinic
          event-type: app-image-built
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "image_tag": "${{ needs.setup.outputs.image_tag }}",
              "env": "${{ needs.setup.outputs.env }}",
              "services": "${{ join(fromJson(needs.detect-changes.outputs.matrix), ' ') }}"
            }
