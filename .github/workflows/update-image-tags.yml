name: Update Image Tags

on:
  repository_dispatch:
    types: [app-image-built]

permissions:
  contents: write

jobs:
  update-tags:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq && chmod +x /usr/local/bin/yq

      - name: Update image tags
        env:
          IMAGE_TAG: ${{ github.event.client_payload.image_tag }}
          ENV: ${{ github.event.client_payload.env }}
          SERVICES: ${{ github.event.client_payload.services }}
        run: |
          # dev → helm-values/{service}.yaml
          # prod → helm-values/{service}-prod.yaml
          SUFFIX=""
          if [ "${ENV}" = "prod" ]; then
            SUFFIX="-prod"
          fi

          for service in ${SERVICES}; do
            values_file="helm-values/${service}${SUFFIX}.yaml"
            if [ -f "${values_file}" ]; then
              yq -i ".image.tag = \"${IMAGE_TAG}\"" "${values_file}"
              echo "Updated ${values_file} → tag: ${IMAGE_TAG}"
            else
              echo "Warning: ${values_file} not found, skipping"
            fi
          done

      - name: Commit and push
        env:
          IMAGE_TAG: ${{ github.event.client_payload.image_tag }}
          ENV: ${{ github.event.client_payload.env }}
          SERVICES: ${{ github.event.client_payload.services }}
        run: |
          SERVICE_LIST=$(echo "${SERVICES}" | tr ' ' ', ')
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-values/
          git diff --staged --quiet || \
            git commit -m "ci(${ENV}): update image tags to ${IMAGE_TAG} (${SERVICE_LIST})"
          git push
