name: Seed ECR — Pull springcommunity images → push to ECR

# One-shot workflow to populate ECR with the official springcommunity images
# so ArgoCD can do its first sync without needing the app repo fork.
# Uses QEMU to pull the linux/arm64 variants (matches t4g.small Graviton nodes).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to apply to pushed images"
        required: true
        default: "seed"
        type: string
      services:
        description: "Space-separated services (blank = all 8)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: 158709926611.dkr.ecr.eu-central-1.amazonaws.com
  TAG: ${{ github.event.inputs.tag }}

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull (linux/arm64) and push to ECR
        run: |
          SERVICES="${{ github.event.inputs.services }}"
          if [ -z "$SERVICES" ]; then
            SERVICES="config-server discovery-server api-gateway customers-service visits-service vets-service genai-service admin-server"
          fi
          for svc in $SERVICES; do
            SOURCE="springcommunity/spring-petclinic-${svc}:latest"
            TARGET="${ECR_REGISTRY}/petclinic-dev/${svc}:${TAG}"
            echo "==> $SOURCE → $TARGET"
            docker pull --platform linux/arm64 "$SOURCE"
            docker tag "$SOURCE" "$TARGET"
            docker push "$TARGET"
          done

      - name: Update image tags in helm-values
        run: |
          SERVICES="${{ github.event.inputs.services }}"
          if [ -z "$SERVICES" ]; then
            SERVICES="config-server discovery-server api-gateway customers-service visits-service vets-service genai-service admin-server"
          fi
          for svc in $SERVICES; do
            FILE="helm-values/${svc}.yaml"
            if [ -f "$FILE" ]; then
              # Upsert image.tag — add if missing, replace if present
              if grep -q "^  tag:" "$FILE"; then
                sed -i "s|^  tag:.*|  tag: \"${TAG}\"|" "$FILE"
              else
                sed -i "/^image:/a\\  tag: \"${TAG}\"" "$FILE"
              fi
              echo "Updated $FILE → tag: ${TAG}"
            fi
          done

      - name: Commit and push tag updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-values/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: seed ECR — set image tag to ${TAG}"
          git push
