fullnameOverride: genai-service

image:
  tag: "seed"
  repository: "158709926611.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/genai-service"

service:
  port: 8084

config:
  SPRING_PROFILES_ACTIVE: "docker"
  CONFIG_SERVER_URL: "http://config-server:8888"

env:
  - name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: openai-api-key
        key: OPENAI_API_KEY

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ['sh', '-c', 'until wget -qO- http://config-server:8888/actuator/health; do sleep 5; done']
  - name: wait-for-discovery-server
    image: busybox:1.36
    command: ['sh', '-c', 'until wget -qO- http://discovery-server:8761/actuator/health; do sleep 5; done']
